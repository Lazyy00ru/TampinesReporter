<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agency Profile — Tampines Estate Reporter</title>

<!-- ── Shared navbar (header + bottom nav + CSS tokens) ── -->
<script src="../static/base.js"
        data-page="profile"
        data-title="Agency Profile"
        data-sub="Agency Officer · Case Management">
</script>
<link rel="stylesheet" href="/static/agency-custom.css">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ── TOKENS (mirrors agency_dashboard.html) ── */
:root {
  --white:     #ffffff;
  --off:       #fafaf9;
  --surface:   #f5f4f1;
  --border:    #e8e6e1;
  --border2:   #d4d1ca;
  --text:      #111110;
  --muted:     #79776e;
  --muted2:    #a8a39a;
  --amber:     #d97706;
  --amber-lt:  #fef3c7;
  --amber-md:  #fde68a;
  --amber-dk:  #92400e;
  --navy:      #1A3A6B;
  --r:         10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  line-height: 1.4;
}

/* ── PAGE WRAPPER ── */
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 28px 20px calc(var(--b-bnav-h, 76px) + 24px);
}

@media (min-width: 900px) {
  .page { padding-bottom: 40px; }
}

/* ── PROFILE HERO ── */
.profile-hero {
  background: linear-gradient(to right, #5ce7ec 0%, #5fdec4 50%, #0b7fb5 100%);
  border: none;
  border-radius: var(--r);
  padding: 36px 24px 32px;
  margin-bottom: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero-stripe {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.35);
}

.ph-avatar {
  width: 64px;
  height: 64px;
  border-radius: var(--r);
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 14px;
}

.ph-name {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  color: #ffffff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.22);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.ph-role {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ── INFO CARD ── */
.info-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 24px;
}

.info-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.info-row:last-child { border-bottom: none; }
.info-row:hover { background: var(--off); }

.info-icon {
  font-size: 16px;
  flex-shrink: 0;
  width: 22px;
  text-align: center;
  opacity: 0.75;
}

.info-body { flex: 1; min-width: 0; }

.info-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.info-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

/* ── SIGN OUT ── */
.signout-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--r);
  border: 1px solid #fecaca;
  cursor: pointer;
  background: #fef2f2;
  color: #dc2626;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.15s, border-color 0.15s;
  letter-spacing: 0.01em;
}
.signout-btn:hover { background: #fee2e2; border-color: #fca5a5; }
.signout-btn:active { background: #fecaca; }
</style>
</head>
<body>

<div class="page">

  <!-- Profile Hero -->
  <div class="profile-hero">
    <div class="hero-stripe"></div>
    <div class="ph-avatar" id="phAvatar"><i class="fa-solid fa-building" style="color:#0EA5E9"></i></div>
    <div class="ph-name" id="phName">—</div>
    <div class="ph-role">Agency Officer · Case Management</div>
  </div>

  <!-- Agency Details -->
  <div class="section-label">Agency Details</div>
  <div class="info-card">
    <div class="info-row">
      <span class="info-icon"><i class="fa-solid fa-building" style="color:#0EA5E9"></i></span>
      <div class="info-body">
        <div class="info-label">Agency</div>
        <div class="info-value" id="infoAgency">—</div>
      </div>
    </div>
    <div class="info-row">
      <span class="info-icon"><i class="fa-solid fa-user-tie" style="color:#7C3AED"></i></span>
      <div class="info-body">
        <div class="info-label">Role</div>
        <div class="info-value">Agency Officer</div>
      </div>
    </div>
    <div class="info-row">
      <span class="info-icon"><i class="fa-solid fa-location-dot" style="color:#EF4444"></i></span>
      <div class="info-body">
        <div class="info-label">Zone</div>
        <div class="info-value">Tampines, Singapore</div>
      </div>
    </div>
    <div class="info-row">
      <span class="info-icon"><i class="fa-solid fa-tower-broadcast" style="color:#14B8A6"></i></span>
      <div class="info-body">
        <div class="info-label">System</div>
        <div class="info-value">Tampines Estate Reporter</div>
      </div>
    </div>
  </div>

  <!-- Sign Out -->
  <button class="signout-btn" onclick="logout()">
  <i class="fa-solid fa-right-from-bracket" style="color:#DC2626"></i>
  Sign Out
</button>

</div>

<script>
let AGENCY = '';

(function () {
  const s = sessionStorage.getItem('agency_session');
  if (!s) { window.location.replace('/agency_login.html'); return; }
  try {
    const a = JSON.parse(s);
    if (!a.agency) { window.location.replace('/agency_login.html'); return; }
    AGENCY = a.agency;

    const ICONS = {
  "NEA / Town Council":
    '<i class="fa-solid fa-recycle" style="color:#10B981"></i>',

  "Town Council / HDB":
    '<i class="fa-solid fa-building" style="color:#0EA5E9"></i>',

  "SP Group / Town Council":
    '<i class="fa-solid fa-bolt" style="color:#F59E0B"></i>',

  "PUB / Town Council":
    '<i class="fa-solid fa-droplet" style="color:#2563EB"></i>',

  "SCDF / HDB / Police":
    '<i class="fa-solid fa-fire-extinguisher" style="color:#DC2626"></i>',

  "NEA / Police / CMC":
    '<i class="fa-solid fa-shield-halved" style="color:#7C3AED"></i>',

  "NEA / NParks / AVS":
    '<i class="fa-solid fa-leaf" style="color:#16A34A"></i>',

  "LTA / HDB / URA":
    '<i class="fa-solid fa-road" style="color:#475569"></i>',

  "NParks / Town Council":
    '<i class="fa-solid fa-tree" style="color:#15803D"></i>'
};
    const icon = ICONS[AGENCY] ||
  '<i class="fa-solid fa-building"></i>';

document.getElementById('phAvatar').innerHTML = icon;
    document.getElementById('phName').textContent     = AGENCY;
    document.getElementById('infoAgency').textContent = AGENCY;
  } catch (e) { window.location.replace('/agency_login.html'); }
})();

function logout() {
  sessionStorage.removeItem('agency_session');
  window.location.replace('/agency_login.html');
}

</script>
</body>
</html>
